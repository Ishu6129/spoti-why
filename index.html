<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spoti-why - Premium Noise</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3844/3844724.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1896302359331374"
     crossorigin="anonymous"></script>
</head>

<body>
    <!-- Fixed Island Branding -->
    <div class="logo" id="app-logo">
        <span class="logo-text">Spoti-why</span>
    </div>

    <!-- Party Mode Canvas (lightweight) -->
    <canvas id="party-canvas"></canvas>

    <div class="app-wrapper">
        <div class="app-container">
            <div class="bg-glow" id="bg-glow"></div>
            <!-- Header -->
            <header class="app-header">
                <div class="search-box">
                    <i data-lucide="search"></i>
                    <div class="search-loader" id="search-loader"></div>
                    <input type="text" id="search-input" placeholder="Search artists, songs...">
                </div>
            </header>

            <!-- Main Content Area -->
            <main class="main-layout">
                <div class="content-split">
                    <!-- Songs List -->
                    <section class="songs-section">
                        <div class="section-header">
                            <h2>Trending Songs</h2>
                            <button class="view-all" id="view-all-songs">View All</button>
                        </div>
                        <div class="songs-list" id="songs-list">
                            <div class="loading-placeholder">Search "malal" to get started...</div>
                        </div>
                    </section>

                    <!-- Playlist Panel -->
                    <aside class="playlist-panel">
                        <div class="section-header">
                            <h2>Your Playlist</h2>
                        </div>
                        <div class="ad-block">
                            <!-- spoti-why -->
                            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1896302359331374"
                                 crossorigin="anonymous"></script>
                            <ins class="adsbygoogle"
                                 style="display:block"
                                 data-ad-client="ca-pub-1896302359331374"
                                 data-ad-slot="1757371197"
                                 data-ad-format="auto"
                                 data-full-width-responsive="true"></ins>
                            <script>
                                (adsbygoogle = window.adsbygoogle || []).push({});
                            </script>
                        </div>
                        <div class="playlist-items" id="playlist-items">
                            <div class="empty-playlist">
                                <i data-lucide="list-music"></i>
                                <p>Queue is empty</p>
                            </div>
                        </div>
                    </aside>
                </div>
            </main>
        </div>
    </div>

    <!-- Player Bar -->
    <footer class="player-bar" id="player-bar">
        <div class="track-details">
            <div class="mini-album-art">
                <img id="current-img" src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=150&q=80" alt="Album Art">
            </div>
            <div class="track-meta">
                <h4 id="current-title">No Track</h4>
                <p id="current-artist">Select a song</p>
            </div>
            <div class="visualizer" id="visualizer">
                <div class="vis-bar"></div>
                <div class="vis-bar"></div>
                <div class="vis-bar"></div>
                <div class="vis-bar"></div>
                <div class="vis-bar"></div>
            </div>
        </div>

        <div class="player-core">
            <div class="main-controls">
                <button class="control-btn" id="shuffle-btn"><i data-lucide="shuffle"></i></button>
                <button class="control-btn" id="prev-btn"><i data-lucide="skip-back"></i></button>
                <button class="play-pause-btn" id="play-pause-btn">
                    <i data-lucide="play" id="play-icon"></i>
                </button>
                <button class="control-btn" id="next-btn"><i data-lucide="skip-forward"></i></button>
                <button class="control-btn" id="repeat-btn"><i data-lucide="repeat"></i></button>
            </div>
            <div class="progress-area">
                <span class="time" id="current-time">0:00</span>
                <div class="progress-bar-wrapper" id="progress-bar">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                    <div class="waveform-overlay"></div>
                </div>
                <span class="time" id="total-time">0:00</span>
            </div>
        </div>

        <div class="extra-controls">
            <button class="control-btn" id="download-btn" title="Download"><i data-lucide="download"></i></button>
            <button class="control-btn" id="party-btn" title="Party Mode"><i data-lucide="sparkles"></i></button>
            <button class="control-btn"><i data-lucide="volume-2"></i></button>
            <div class="volume-bar-wrapper" id="volume-bar">
                <div class="volume-bar-fill" id="volume-fill" style="width: 70%"></div>
            </div>
        </div>
    </footer>

    <!-- Mobile Navigation Bar -->
    <nav class="mobile-nav">
        <div class="nav-item active" id="nav-home"><i data-lucide="home"></i><span>Home</span></div>
        <div class="nav-item" id="nav-search"><i data-lucide="search"></i><span>Search</span></div>
        <div class="nav-item" id="nav-library"><i data-lucide="library"></i><span>Library</span></div>
    </nav>

    <!-- Mobile Player Drawer -->
    <div class="mobile-player-drawer" id="mobile-player-drawer">
        <div class="drawer-header">
            <button class="drawer-close" id="close-drawer"><i data-lucide="chevron-down"></i></button>
            <span>Now Playing</span>
            <button class="icon-btn"><i data-lucide="more-vertical"></i></button>
        </div>
        <div class="drawer-content">
            <div class="drawer-album-art">
                <img id="drawer-img" src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=300&q=80" alt="Album Art">
            </div>
            <div class="drawer-info">
                <h2 id="drawer-title">No Track</h2>
                <p id="drawer-artist">Select a song</p>
            </div>
            <div class="drawer-controls">
                <div class="drawer-progress">
                    <div class="progress-bar-wrapper" id="drawer-progress-bar">
                        <div class="progress-bar-fill" id="drawer-progress-fill"></div>
                    </div>
                    <div class="time-info">
                        <span id="drawer-current">0:00</span>
                        <span id="drawer-total">0:00</span>
                    </div>
                </div>
                <div class="drawer-main-btns">
                    <button class="control-btn" id="drawer-shuffle-btn"><i data-lucide="shuffle"></i></button>
                    <button class="control-btn" id="drawer-prev"><i data-lucide="skip-back"></i></button>
                    <button class="play-pause-btn main" id="drawer-play-pause">
                        <i data-lucide="play" id="drawer-play-icon"></i>
                    </button>
                    <button class="control-btn" id="drawer-next"><i data-lucide="skip-forward"></i></button>
                    <button class="control-btn" id="drawer-repeat-btn"><i data-lucide="repeat"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Audio Element -->
    <audio id="audio-player"></audio>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
    
</body>

</html>
